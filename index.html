          {"@type":"Question","name":"I already use a spreadsheet. Why switch?","acceptedAnswer":{"@type":"Answer","text":"A spreadsheet can hold prices, but it can't optimise a roll layout, snap a polygon to scale, or generate a client-facing PDF. Flooro does all three from one input — your floor plan."}},
          {"@type":"Question","name":"My measurements have to be perfect. Can I trust this?","acceptedAnswer":{"@type":"Answer","text":"Two-click scale calibration locks the plan to real-world units. Vertex snapping, right-angle enforcement, and inline edge editing mean you control every measurement to mm precision."}},
          {"@type":"Question","name":"What about complex jobs — herringbone, multiple rooms, transitions?","acceptedAnswer":{"@type":"Answer","text":"Pattern engine handles herringbone, basketweave, brick, thirds, and diagonal at any angle. Transitions, shared edges, coving, and cross-room offcut reuse are built in — not bolt-ons."}},
